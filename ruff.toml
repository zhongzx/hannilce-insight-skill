# ============================================================
# Ruff Configuration
# ============================================================
# Ruff: Fast Python linter & formatter (Black + Flake8 + isort)

target-version = "py311"

[lint]
# 启用规则组
select = [
    "E",    # pycodestyle errors (PEP 8)
    "W",    # pycodestyle warnings
    "F",    # Pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
    "SIM102", # use `if x is not None` instead of `if not x is None`
]

[lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"tests/*" = ["B011"]

[format]
# Black-compatible formatter
quote-style = "double"
indent-style = "space"
line-ending = "lf"
