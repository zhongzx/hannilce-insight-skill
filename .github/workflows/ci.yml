name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "pr/**"]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      run_llm:
        description: "是否运行可选的 LLM 验收（不阻断合并）"
        required: false
        default: "false"
  schedule:
    - cron: "0 3 * * *"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        run: |
          ruff check .
          ruff format --check .

  regression-offline:
    name: Regression (offline, hard fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run simulator regression
        run: |
          python simulate_conversation.py \
            --scenario all \
            --openrouter off \
            --llm-signals off \
            --llm-semantic off \
            --unified-llm off \
            --max-turns 12 \
            --seed 123 \
            --random-profile \
            --quality-check \
            --ci \
            --jsonl-out artifacts/ci/offline.jsonl

      - name: Summarize
        run: |
          python simulate_conversation.py --summarize-jsonl artifacts/ci/offline.jsonl

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-offline-logs
          path: artifacts/ci/

  regression-llm:
    name: Regression (LLM, soft)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' && inputs.run_llm == 'true' ||
      github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.fork == false &&
        contains(join(github.event.pull_request.labels.*.name, ','), 'run-llm-ci')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run simulator regression (LLM)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          OPENROUTER_DEBUG: "1"
        run: |
          python simulate_conversation.py \
            --scenario all \
            --openrouter on \
            --llm-signals on \
            --llm-semantic on \
            --unified-llm on \
            --max-turns 12 \
            --seed 123 \
            --random-profile \
            --quality-check \
            --jsonl-out artifacts/ci/llm.jsonl || true

      - name: Summarize
        run: |
          python simulate_conversation.py --summarize-jsonl artifacts/ci/llm.jsonl || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-llm-logs
          path: artifacts/ci/
